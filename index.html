<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Медицинский опросник</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-stethoscope text-4xl"></i>
        <div>
          <h1>Медицинский опросник</h1>
          <p>Клещевой энцефалит • Калькулятор калорий</p>
        </div>
      </div>
    </div>

    <div class="main-content">

      <!-- Калькулятор калорий -->
      <div class="card">
        <h2><i class="fa-solid fa-fire-flame-curved"></i> Калькулятор калорий в день</h2>
        <div class="form-grid">
          <div>
            <label>Вес (кг)</label>
            <input type="number" id="weight" placeholder="70">
          </div>
          <div>
            <label>Пол</label>
            <div class="gender-buttons">
              <button onclick="setGender(1)" id="maleBtn" class="active">Мужчина</button>
              <button onclick="setGender(0)" id="femaleBtn">Женщина</button>
            </div>
          </div>
        </div>
        <button onclick="calculateKcal()" class="btn btn-orange">Рассчитать калории</button>
        <div id="kcalResult" class="result-text hidden"></div>
      </div>

      <!-- Опросник -->
      <div class="card">
        <h2><i class="fa-solid fa-clipboard-question"></i> Тест: Клещевой энцефалит</h2>

        <div id="startScreen">
          <input type="text" id="userName" placeholder="Ваше имя" class="input">
          <button onclick="startQuiz()" class="btn btn-indigo">Начать тест</button>
        </div>

        <div id="quizScreen" class="hidden">
          <div class="progress">
            <span>Вопрос <span id="qNum">1</span>/10</span>
            <span id="quizUser"></span>
          </div>
          <h3 id="questionText"></h3>
          <div id="options" class="options"></div>
          <button id="nextBtn" onclick="nextQuestion()" class="hidden btn btn-indigo">Далее →</button>
        </div>

        <div id="resultScreen" class="hidden text-center">
          <h3>Результат для <span id="resultUser"></span></h3>
          <div id="scoreCircle" class="score-circle"></div>
          <p id="resultMsg"></p>
          <button onclick="restartQuiz()" class="btn btn-indigo">Пройти заново</button>
          <button onclick="showAdminPanel()" class="btn btn-outline">👨‍💼 Админ-панель</button>
        </div>
      </div>

      <!-- Админ панель -->
      <div class="card">
        <h2><i class="fa-solid fa-lock"></i> Админ-панель</h2>
        <input type="password" id="adminPass" placeholder="Пароль" class="input">
        <button onclick="loginAdmin()" class="btn btn-orange">Войти</button>
        <div id="adminContent" class="hidden">
          <h3>Результаты пользователей</h3>
          <div id="adminResults"></div>
          <button onclick="clearAllResults()" class="btn btn-red">Очистить результаты</button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
